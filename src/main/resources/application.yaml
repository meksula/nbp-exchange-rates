spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: nbp-exchange-rates

  datasource:
    url: jdbc:h2:file:./data/nbp-cache;AUTO_SERVER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  jackson:
    deserialization:
      fail-on-unknown-properties: false

  h2:
    console:
      enabled: true
      path: /h2-console

nbp-api:
  root-url: https://api.nbp.pl/api
  connect-timeout: 5s
  read-timeout: 10s

resilience4j:
  retry:
    instances:
      nbp-api-retry:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException

logging:
  level:
    io.github.resilience4j: DEBUG