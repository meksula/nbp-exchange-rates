spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: nbp-exchange-rates

  datasource:
    url: jdbc:h2:file:./data/nbp-cache;AUTO_SERVER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  jackson:
    deserialization:
      fail-on-unknown-properties: false

  h2:
    console:
      enabled: true
      path: /h2-console

nbp-api:
  root-url: https://api.nbp.pl/api
