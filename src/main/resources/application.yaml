spring:
  application:
    name: nbp-exchange-rates

  datasource:
    url: jdbc:h2:file:./data/nbp-cache;AUTO_SERVER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

nbp-api:
  base-url: https://api.nbp.pl/api
